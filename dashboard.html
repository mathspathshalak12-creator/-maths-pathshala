<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login — Maths Pathshala</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1E3D; --navy-2:#122A52; --amber:#F5A623; --amber-dark:#B5760F;
    --cream:#FAF8F3; --paper:#FFFFFF; --muted:#5B6B85; --line:#E4E0D6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;color:var(--navy);background:var(--cream);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  h1,h2,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    max-width:420px;width:100%;padding:40px 32px;
  }
  .logo{font-weight:700;font-size:22px;text-align:center;margin-bottom:6px;}
  .logo span{color:var(--amber-dark);}
  .subhead{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px;}
  .phone-row{display:flex;gap:8px;margin-bottom:20px;}
  .cc{
    background:var(--cream);border:1.5px solid var(--line);border-radius:8px;
    padding:12px 14px;font-size:15px;font-weight:600;color:var(--muted);flex-shrink:0;
  }
  input{
    width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:8px;
    font-size:15px;font-family:'Inter',sans-serif;color:var(--navy);
  }
  input:focus{outline:none;border-color:var(--amber-dark);}
  .btn{
    width:100%;padding:14px;border-radius:8px;font-weight:600;font-size:15px;
    border:none;cursor:pointer;margin-top:8px;transition:opacity .15s ease;
  }
  .btn:disabled{opacity:0.6;cursor:not-allowed;}
  .btn-primary{background:var(--amber);color:var(--navy);}
  .btn-primary:hover:not(:disabled){background:var(--amber-dark);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--muted);margin-top:12px;}
  .msg{font-size:13px;text-align:center;margin-top:16px;min-height:18px;}
  .msg.error{color:#C0392B;}
  .msg.success{color:#1E7A46;}
  #otp-step{display:none;}

  /* DASHBOARD */
  #dashboard-screen{display:none;}
  .dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .dash-name{font-size:20px;font-weight:700;}
  .dash-phone{font-size:13px;color:var(--muted);}
  .logout-btn{
    font-size:13px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--line);
    padding:8px 14px;border-radius:6px;cursor:pointer;
  }
  .dash-card{
    background:var(--cream);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:14px;
  }
  .dash-label{font-size:12px;font-weight:700;color:var(--amber-dark);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}
  .dash-value{font-size:16px;font-weight:600;}
  .fee-badge{
    display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;
  }
  .fee-paid{background:#DFF4E7;color:#1E7A46;}
  .fee-due{background:#FBE2E1;color:#C0392B;}
  .notes-list{list-style:none;margin-top:6px;}
  .notes-list li{padding:8px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:14px;}
  .notes-list li:first-child{border-top:none;}
  .notes-list a{color:var(--navy);font-weight:600;text-decoration:none;font-size:13px;border:1px solid var(--navy);border-radius:6px;padding:5px 10px;}
  .notes-list a:hover{background:var(--navy);color:#fff;}
  .not-found{text-align:center;padding:20px 0;color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<div class="card" id="login-card">
  <div class="logo">Maths <span>Pathshala</span></div>
  <div class="subhead">Student login — Kalyanpur, Kanpur</div>

  <div id="phone-step">
    <label>Your registered mobile number</label>
    <div class="phone-row">
      <div class="cc">+91</div>
      <input type="tel" id="phone-input" placeholder="98765 43210" maxlength="10">
    </div>
    <button class="btn btn-primary" id="send-otp-btn">Send OTP</button>
  </div>

  <div id="otp-step">
    <label>Enter the 6-digit OTP</label>
    <input type="text" id="otp-input" placeholder="123456" maxlength="6" style="margin-bottom:8px;">
    <button class="btn btn-primary" id="verify-otp-btn">Verify &amp; Login</button>
    <button class="btn btn-outline" id="change-number-btn">Change number</button>
  </div>

  <div class="msg" id="status-msg"></div>
  <div id="recaptcha-container"></div>
</div>

<div class="card" id="dashboard-screen">
  <div class="dash-header">
    <div>
      <div class="dash-name" id="dash-name">Student</div>
      <div class="dash-phone" id="dash-phone"></div>
    </div>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </div>

  <div class="dash-card">
    <div class="dash-label">Fee status</div>
    <span class="fee-badge" id="fee-badge">—</span>
  </div>

  <div class="dash-card">
    <div class="dash-label">Batch timing</div>
    <div class="dash-value" id="batch-value">—</div>
  </div>

  <div class="dash-card">
    <div class="dash-label">Your notes</div>
    <ul class="notes-list" id="notes-list"><li>No notes assigned yet</li></ul>
  </div>
</div>

<div class="card" id="not-found-screen" style="display:none;">
  <div class="logo">Maths <span>Pathshala</span></div>
  <div class="not-found">
    We couldn't find your record. Please contact us on WhatsApp so we can set up your account.
  </div>
  <a class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;" id="not-found-wa" target="_blank">Message on WhatsApp</a>
  <button class="btn btn-outline" id="not-found-logout-btn">Try a different number</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ==== YOUR FIREBASE CONFIG ====
  const firebaseConfig = {
    apiKey: "AIzaSyB3fzWzwiTxHJi1M3OQI3hgZJpi6lq-eww",
    authDomain: "maths-pathshala.firebaseapp.com",
    projectId: "maths-pathshala",
    storageBucket: "maths-pathshala.firebasestorage.app",
    messagingSenderId: "848136078985",
    appId: "1:848136078985:web:385a3d6602550de113e858",
    measurementId: "G-T8T96LLPQZ"
  };
  const WHATSAPP_NUMBER = "919506054813";
  // ================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginCard = document.getElementById('login-card');
  const dashboardScreen = document.getElementById('dashboard-screen');
  const notFoundScreen = document.getElementById('not-found-screen');
  const phoneStep = document.getElementById('phone-step');
  const otpStep = document.getElementById('otp-step');
  const statusMsg = document.getElementById('status-msg');

  document.getElementById('not-found-wa').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("Hi, I tried logging into the student dashboard but my number isn't registered. Can you set up my account?")}`;

  function showMsg(text, type){
    statusMsg.textContent = text;
    statusMsg.className = 'msg ' + (type || '');
  }

  window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });

  let confirmationResult = null;

  document.getElementById('send-otp-btn').addEventListener('click', () => {
    const raw = document.getElementById('phone-input').value.trim();
    if(raw.length !== 10 || isNaN(raw)){
      showMsg('Please enter a valid 10-digit number', 'error');
      return;
    }
    const phoneNumber = "+91" + raw;
    const btn = document.getElementById('send-otp-btn');
    btn.disabled = true; btn.textContent = "Sending...";
    signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
      .then((result) => {
        confirmationResult = result;
        phoneStep.style.display = 'none';
        otpStep.style.display = 'block';
        showMsg('OTP sent! Check your SMS.', 'success');
      })
      .catch((error) => {
        showMsg('Error sending OTP: ' + error.message, 'error');
      })
      .finally(() => { btn.disabled = false; btn.textContent = "Send OTP"; });
  });

  document.getElementById('change-number-btn').addEventListener('click', () => {
    otpStep.style.display = 'none';
    phoneStep.style.display = 'block';
    showMsg('');
  });

  document.getElementById('verify-otp-btn').addEventListener('click', () => {
    const code = document.getElementById('otp-input').value.trim();
    if(!confirmationResult){ showMsg('Please request OTP again.', 'error'); return; }
    const btn = document.getElementById('verify-otp-btn');
    btn.disabled = true; btn.textContent = "Verifying...";
    confirmationResult.confirm(code)
      .then(async (result) => {
        const user = result.user;
        await loadDashboard(user.phoneNumber);
      })
      .catch((error) => {
        showMsg('Invalid OTP, please try again.', 'error');
      })
      .finally(() => { btn.disabled = false; btn.textContent = "Verify & Login"; });
  });

  async function loadDashboard(phoneNumber){
    const docRef = doc(db, "students", phoneNumber);
    const docSnap = await getDoc(docRef);

    if(!docSnap.exists()){
      loginCard.style.display = 'none';
      notFoundScreen.style.display = 'block';
      return;
    }

    const data = docSnap.data();
    document.getElementById('dash-name').textContent = data.name || "Student";
    document.getElementById('dash-phone').textContent = phoneNumber;

    const feeBadge = document.getElementById('fee-badge');
    if(data.feeStatus === 'Paid'){
      feeBadge.textContent = 'Paid';
      feeBadge.className = 'fee-badge fee-paid';
    } else {
      feeBadge.textContent = data.feeStatus || 'Due';
      feeBadge.className = 'fee-badge fee-due';
    }

    document.getElementById('batch-value').textContent = data.batchTiming || 'Not assigned yet';

    const notesList = document.getElementById('notes-list');
    notesList.innerHTML = '';
    if(Array.isArray(data.notes) && data.notes.length > 0){
      data.notes.forEach(note => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${note.title}</span><a href="${note.url}" target="_blank" download>Download</a>`;
        notesList.appendChild(li);
      });
    } else {
      notesList.innerHTML = '<li>No notes assigned yet</li>';
    }

    loginCard.style.display = 'none';
    notFoundScreen.style.display = 'none';
    dashboardScreen.style.display = 'block';
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await signOut(auth);
    location.reload();
  });
  document.getElementById('not-found-logout-btn').addEventListener('click', async () => {
    await signOut(auth);
    location.reload();
  });
</script>
</body>
</html>
